  }
  .card { text-align: center; width: 100%; max-width: 560px; position: relative; }
  h1 {
    color: #fff; font-size: clamp(2rem, 8vw, 3.4rem);
    text-shadow: 0 3px 18px rgba(0,0,0,0.8); margin-bottom: 50px; line-height: 1.2;
    animation: flutua 3s ease-in-out infinite;
  }
  @keyframes flutua { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
  .botoes { position: relative; display: flex; gap: 22px; justify-content: center; align-items: center; flex-wrap: wrap; min-height: 80px; }
  button {
    font-size: 1.5rem; font-weight: 700; padding: 16px 34px; border: none; border-radius: 50px;
    cursor: pointer; transition: transform .15s ease, box-shadow .2s ease; box-shadow: 0 6px 20px rgba(0,0,0,.35);
  }
  .sim { background: linear-gradient(135deg,#ff4d8d,#ff2d6f); color:#fff; }
  .sim:hover { transform: scale(1.08); box-shadow: 0 8px 26px rgba(255,45,111,.6); }
  .nao { background:#f1f1f1; color:#555; }
  .coracao { position: fixed; bottom: -50px; font-size: 2rem; pointer-events: none; animation: subir 4s linear forwards; z-index: 50; }
  @keyframes subir { to { transform: translateY(-110vh) rotate(360deg); opacity: 0; } }
  .aceitou {
    position: fixed; inset: 0; background: linear-gradient(135deg, rgba(255,77,141,.95), rgba(180,0,90,.95));

  }
